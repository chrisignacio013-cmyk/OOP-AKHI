<!DOCTYPE html>

<head>

    <style>
        /* Additional styling for inner pages */
        .page-header {
            padding-top: 120px;
            padding-bottom: 40px;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 40px;
        }
        .back-link {
            color: var(--accent-blue);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            margin-bottom: 20px;
            font-weight: 500;
        }
        .back-link:hover {
            color: var(--accent-blue-hover);
        }
        .content-section {
            margin-bottom: 60px;
            background-color: var(--surface-color-glass);
            padding: 60px 40px;
            border-radius: 24px;
            border: 1px solid var(--border-color);
            text-align: center;
        }
        .content-section h3 {
            margin-bottom: 15px;
            color: var(--text-primary);
            font-size: 1.8rem;
        }
        .content-section p {
            color: var(--text-secondary);
            font-size: 1.1rem;
            max-width: 500px;
            margin: 0 auto;
        }
        .icon-placeholder {
            width: 80px;
            height: 80px;
            background-color: rgba(10, 132, 255, 0.1);
            color: var(--accent-blue);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }
        .icon-placeholder svg {
            width: 40px;
            height: 40px;
        }

</head>
